services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xafsizyol-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xafsizyol-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8000
    restart: always
