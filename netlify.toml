[build]
  command = "npm run build"
  publish = ".output/public"

[build.environment]
  NUXT_PUBLIC_API_BASE = "https://araceli-televisionary-dusti.ngrok-free.dev"

[[redirects]]
  from = "/api/*"
  to = "https://araceli-televisionary-dusti.ngrok-free.dev/api/:splat"
  status = 200
  force = true
  headers = {ngrok-skip-browser-warning = "true"}
